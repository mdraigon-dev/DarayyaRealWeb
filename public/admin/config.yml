# =====================================================================
# Decap CMS Configuration — Darayya Platform
#
# Designed for non-technical council staff: clear emoji-labeled sections,
# smart defaults, helpful Arabic hints, and collapsible advanced fields.
#
# AUTHENTICATION: Netlify Identity. See README → Step 4 for setup.
#
# IMPORTANT: Field shapes match src/content/config.ts (Astro schema).
# When adding fields, update both files together.
# =====================================================================

backend:
  name: git-gateway
  branch: main

# Local editing support: when the site runs on localhost AND `npm run cms`
# (decap-server) is running, Decap talks to the local proxy and edits files
# on disk directly — no login, no commits. Ignored in production.
local_backend: true

# Where uploaded photos are stored
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# Show site logo in the CMS sidebar
logo_url: /logos/darayya-emblem.svg

locale: ar

# =====================================================================
# COLLECTIONS
# =====================================================================
collections:
  # ─────────────────────────────────────────────────────────────────
  # المشاريع — Projects (main collection)
  # ─────────────────────────────────────────────────────────────────
  - name: "projects"
    label: "📋 المشاريع — Projects"
    label_singular: "مشروع جديد"
    folder: "src/content/projects"
    format: "frontmatter"
    extension: "md"
    create: true
    delete: true
    slug: "{{fields.id}}"
    identifier_field: id
    summary: "{{title.ar}}"

    fields:

      # ─── 1. اسم المشروع ──────────────────────────────────────────
      - label: "اسم المشروع"
        name: "title"
        widget: "object"
        hint: "اكتب الاسم بالعربية. النسخة الإنجليزية اختيارية وسيتم مراجعتها لاحقاً"
        fields:
          - label: "بالعربية ★"
            name: "ar"
            widget: "string"
            hint: "مثلاً: تأهيل شارع الجلاء الرئيسي"
          - label: "بالإنجليزية (اختياري)"
            name: "en"
            widget: "string"
            required: false
            hint: "يمكن تركه فارغاً"
            default: ""

      # ─── 2. وصف المشروع ──────────────────────────────────────────
      - label: "وصف المشروع"
        name: "description"
        widget: "object"
        hint: "جملتان أو ثلاث: ماذا سيُبنى، لمن، وما الفائدة"
        fields:
          - label: "بالعربية ★"
            name: "ar"
            widget: "text"
            hint: "وصف مختصر للمشروع باللغة العربية"
          - label: "بالإنجليزية (اختياري)"
            name: "en"
            widget: "text"
            required: false
            default: ""

      # ─── 3. القطاع والحالة ───────────────────────────────────────
      - label: "القطاع"
        name: "category"
        widget: "select"
        hint: "إلى أي قطاع ينتمي المشروع؟"
        options:
          - { label: "🛣️  الطرقات والتعبيد",  value: "roads" }
          - { label: "💧 المياه النظيفة",       value: "water" }
          - { label: "🚿 الصرف الصحي",         value: "sewer" }
          - { label: "💡 الإنارة",              value: "lighting" }
          - { label: "📡 الاتصالات",            value: "communications" }
          - { label: "🏛️  المرافق العامة",      value: "facilities" }

      - label: "حالة المشروع"
        name: "status"
        widget: "select"
        default: "funding"
        hint: "ابدأ بـ \"مفتوح للتبرع\" للمشاريع الجديدة"
        options:
          - { label: "🟡 مفتوح للتبرع — يبحث عن تمويل",      value: "funding" }
          - { label: "🟢 قيد التنفيذ — العمل جارٍ",          value: "active" }
          - { label: "⚫ مكتمل — انتهى العمل",                value: "completed" }
          - { label: "⚪ قيد التخطيط — لم يبدأ بعد",         value: "planning" }

      - label: "صحة المشروع"
        name: "health"
        widget: "select"
        default: "healthy"
        hint: "هل المشروع يسير وفق الخطة؟"
        options:
          - { label: "🟢 يسير بشكل ممتاز",     value: "healthy" }
          - { label: "🟡 يحتاج متابعة",         value: "warning" }
          - { label: "🔴 متعثّر",               value: "stalled" }
          - { label: "⚫ مكتمل",                value: "completed" }

      # ─── 4. الموقع ───────────────────────────────────────────────
      - label: "📍 الموقع"
        name: "location"
        widget: "object"
        hint: "أين يقع المشروع في داريّا؟"
        fields:
          - label: "اسم الموقع (بالعربية) ★"
            name: "ar"
            widget: "string"
            hint: "مثلاً: الحي الشرقي — داريّا، وسط المدينة"
          - label: "اسم الموقع (بالإنجليزية، اختياري)"
            name: "en"
            widget: "string"
            required: false
            default: ""

      - label: "خط العرض (Latitude)"
        name: "lat"
        widget: "number"
        value_type: "float"
        default: 33.45
        hint: "افتراضي: ٣٣٫٤٥ (وسط داريّا). عدّل قليلاً للموقع الدقيق"

      - label: "خط الطول (Longitude)"
        name: "lng"
        widget: "number"
        value_type: "float"
        default: 36.25
        hint: "افتراضي: ٣٦٫٢٥ (وسط داريّا). عدّل قليلاً للموقع الدقيق"

      # ─── 5. التمويل ──────────────────────────────────────────────
      - label: "💰 الميزانية المطلوبة (بالدولار)"
        name: "budgetUSD"
        widget: "number"
        value_type: "int"
        min: 1
        hint: "كم يحتاج المشروع بالكامل؟ مثلاً: 50000"

      - label: "💵 المبلغ المحصّل حتى الآن (بالدولار)"
        name: "raisedUSD"
        widget: "number"
        value_type: "int"
        min: 0
        default: 0
        hint: "ابدأ بـ ٠ للمشاريع الجديدة"

      - label: "👥 عدد المتبرعين"
        name: "donors"
        widget: "number"
        value_type: "int"
        min: 0
        default: 0
        hint: "ابدأ بـ ٠ للمشاريع الجديدة"

      - label: "⏱️ الأيام المتبقية للتمويل"
        name: "daysLeft"
        widget: "number"
        value_type: "int"
        min: 0
        default: 30
        hint: "الافتراضي ٣٠ يوماً"

      # ─── 6. إعدادات متقدمة ───────────────────────────────────────
      - label: "🔧 المعرّف الفريد (رمز المشروع)"
        name: "id"
        widget: "string"
        hint: "لا يتغيّر بعد إنشاء المشروع. أحرف إنجليزية صغيرة وشرطات فقط. مثلاً: roads-jalaa"
        pattern: ['^[a-z0-9-]+$', 'يجب أن يحتوي على أحرف إنجليزية صغيرة، أرقام، وشرطات فقط']

      - label: "ترتيب الظهور (اختياري)"
        name: "order"
        widget: "number"
        value_type: "int"
        default: 0
        required: false
        hint: "الأرقام الأصغر تظهر أولاً. اتركه على ٠ ما لم تكن تريد ترتيباً معيناً"

      - label: "مشروع بارز على الصفحة الرئيسية؟"
        name: "featured"
        widget: "boolean"
        default: false
        required: false
        hint: "اختياري — يضع المشروع ضمن المشاريع البارزة في الواجهة"

      # ─── 7. المشاريع الفرعية ─────────────────────────────────────
      - label: "🧩 المشاريع الفرعية"
        name: "subs"
        widget: "list"
        required: false
        hint: "اختياري: قسّم المشروع إلى أجزاء قابلة للتبرع منفصلة. مثلاً: \"المرحلة الأولى\"، \"المرحلة الثانية\"."
        summary: "{{fields.title.ar}}"
        fields:
          - { label: "المعرّف الفرعي", name: "id", widget: "string", hint: "مثلاً: r1، w2" }
          - label: "العنوان"
            name: "title"
            widget: "object"
            fields:
              - { label: "بالعربية ★", name: "ar", widget: "string" }
              - { label: "بالإنجليزية (اختياري)", name: "en", widget: "string", required: false, default: "" }
          - label: "التفصيل (الطول/الكمية)"
            name: "length"
            widget: "object"
            fields:
              - { label: "بالعربية ★", name: "ar", widget: "string", hint: "مثلاً: ٥٠٠ متر، ٣ خزانات" }
              - { label: "بالإنجليزية (اختياري)", name: "en", widget: "string", required: false, default: "" }
          - { label: "الميزانية بالدولار", name: "budgetUSD", widget: "number", value_type: "int", min: 0 }
          - { label: "المحصّل بالدولار",    name: "raisedUSD", widget: "number", value_type: "int", min: 0, default: 0 }

      # ─── 8. الفريق والمهندسون ───────────────────────────────────
      - label: "👷 الفريق والمهندسون"
        name: "engineers"
        widget: "list"
        required: false
        hint: "اختياري: أضف المهندسين والمقاولين المسؤولين عن المشروع"
        summary: "{{fields.name.ar}} — {{fields.role.ar}}"
        fields:
          - label: "الاسم"
            name: "name"
            widget: "object"
            fields:
              - { label: "بالعربية ★",    name: "ar", widget: "string", hint: "مثلاً: م. أحمد الخالد" }
              - { label: "بالإنجليزية (اختياري)", name: "en", widget: "string", required: false, default: "" }
          - label: "الدور"
            name: "role"
            widget: "object"
            fields:
              - { label: "بالعربية ★",    name: "ar", widget: "string", hint: "مثلاً: مهندس مشرف، مقاول رئيسي" }
              - { label: "بالإنجليزية (اختياري)", name: "en", widget: "string", required: false, default: "" }
          - { label: "الهاتف (اختياري)",          name: "phone", widget: "string", required: false }
          - { label: "البريد الإلكتروني (اختياري)", name: "email", widget: "string", required: false }

      # ─── 9. تحديثات ميدانية ─────────────────────────────────────
      - label: "📝 تحديثات ميدانية"
        name: "updates"
        widget: "list"
        required: false
        hint: "تقارير دورية من الميدان مع تواريخها"
        summary: "{{fields.body.ar}}"
        fields:
          - label: "التاريخ"
            name: "date"
            widget: "object"
            fields:
              - { label: "بالعربية ★",    name: "ar", widget: "string", hint: "مثلاً: منذ ٣ أيام، ١٥ نيسان ٢٠٢٦" }
              - { label: "بالإنجليزية (اختياري)", name: "en", widget: "string", required: false, default: "" }
          - label: "الكاتب"
            name: "author"
            widget: "object"
            fields:
              - { label: "بالعربية ★",    name: "ar", widget: "string" }
              - { label: "بالإنجليزية (اختياري)", name: "en", widget: "string", required: false, default: "" }
          - label: "نص التحديث"
            name: "body"
            widget: "object"
            fields:
              - { label: "بالعربية ★",    name: "ar", widget: "text" }
              - { label: "بالإنجليزية (اختياري)", name: "en", widget: "text", required: false, default: "" }

      # ─── 10. ملاحظات وتعليقات ────────────────────────────────────
      - label: "💬 ملاحظات وتعليقات"
        name: "comments"
        widget: "list"
        required: false
        hint: "ملاحظات عامة (مخاطر، اعتمادات، ملاحظات المقاولين)"
        summary: "{{fields.body.ar}}"
        fields:
          - label: "الكاتب"
            name: "author"
            widget: "object"
            fields:
              - { label: "بالعربية ★",    name: "ar", widget: "string" }
              - { label: "بالإنجليزية (اختياري)", name: "en", widget: "string", required: false, default: "" }
          - label: "النص"
            name: "body"
            widget: "object"
            fields:
              - { label: "بالعربية ★",    name: "ar", widget: "text" }
              - { label: "بالإنجليزية (اختياري)", name: "en", widget: "text", required: false, default: "" }
          - { label: "التاريخ (اختياري)",  name: "date", widget: "string", required: false, hint: "YYYY-MM-DD" }

      # ─── 11. صور من الميدان ─────────────────────────────────────
      - label: "📷 صور من الميدان"
        name: "photos"
        widget: "list"
        required: false
        hint: "ارفع صوراً حقيقية أو اختر نوع المشهد المولّد. الصور الحقيقية تحلّ محل المشاهد التوضيحية تلقائياً"
        summary: "{{fields.caption.ar}}"
        fields:
          - label: "ملف الصورة"
            name: "src"
            widget: "image"
            required: false
            hint: "اختياري — ارفع صورة حقيقية. إذا تركتها فارغة سيتم استخدام رسم توضيحي حسب نوع المشهد"

          - label: "نوع المشهد"
            name: "scene"
            widget: "select"
            required: false
            hint: "يُستخدم فقط إذا لم ترفع صورة حقيقية"
            options:
              - { label: "🛣️  طريق",     value: "road" }
              - { label: "💧 مياه",      value: "water" }
              - { label: "🚿 صرف صحي",   value: "sewer" }
              - { label: "💡 إنارة",     value: "light" }
              - { label: "📡 إنترنت",    value: "internet" }
              - { label: "🏛️  مبنى",     value: "building" }
              - { label: "🌳 حديقة",     value: "park" }

          - label: "الحالة المرئية"
            name: "status"
            widget: "select"
            default: "healthy"
            options:
              - { label: "🟢 يسير جيداً",       value: "healthy" }
              - { label: "🟡 تأخير",             value: "warning" }
              - { label: "🔴 متعثّر",            value: "stalled" }
              - { label: "⚫ مكتمل",             value: "completed" }

          - label: "تعليق على الصورة"
            name: "caption"
            widget: "object"
            fields:
              - { label: "بالعربية ★",    name: "ar", widget: "string" }
              - { label: "بالإنجليزية (اختياري)", name: "en", widget: "string", required: false, default: "" }
          - label: "تاريخ التقاط الصورة"
            name: "date"
            widget: "object"
            fields:
              - { label: "بالعربية ★",    name: "ar", widget: "string", hint: "مثلاً: منذ يومين" }
              - { label: "بالإنجليزية (اختياري)", name: "en", widget: "string", required: false, default: "" }

      # ─── 12. نص حر (نادراً ما يُستخدم) ──────────────────────────
      - label: "نص إضافي حر (نادر الاستخدام)"
        name: "body"
        widget: "markdown"
        required: false
        hint: "نادراً ما يستخدم — للتوسعات النصية حول المشروع"

  # ─────────────────────────────────────────────────────────────────
  # SITE SETTINGS
  # ─────────────────────────────────────────────────────────────────
  - name: "site"
    label: "⚙️  إعدادات الموقع"
    files:
      - name: "settings"
        label: "إعدادات عامة"
        file: "src/content/site/settings.json"
        format: "json"
        fields:
          - label: "اسم الموقع"
            name: "title"
            widget: "object"
            fields:
              - { label: "بالعربية ★",    name: "ar", widget: "string" }
              - { label: "بالإنجليزية (اختياري)", name: "en", widget: "string", required: false, default: "" }
          - label: "الشعار النصي"
            name: "tagline"
            widget: "object"
            fields:
              - { label: "بالعربية ★",    name: "ar", widget: "string" }
              - { label: "بالإنجليزية (اختياري)", name: "en", widget: "string", required: false, default: "" }
          - { label: "بريد التواصل", name: "contactEmail", widget: "string" }
          - { label: "هاتف التواصل",  name: "contactPhone", widget: "string" }

  # ════════════════════════════════════════════════════════════════
  # CIRCULARS & DECISIONS — council documents
  # The primary upload path is the custom form on /xx/circulars/ which
  # handles binary file uploads. This Decap collection lets admins
  # edit metadata (title, description, category, date) after upload.
  # ════════════════════════════════════════════════════════════════
  - name: "circulars"
    label: "📚 التعاميم والقرارات"
    label_singular: "وثيقة"
    folder: "src/content/circulars"
    create: false  # New uploads go through the custom form (handles binaries)
    delete: true
    format: "yaml-frontmatter"
    slug: "{{id}}"
    summary: "{{title.ar}} — {{date}}"
    fields:
      - { label: "المعرّف", name: "id", widget: "string" }
      - label: "العنوان"
        name: "title"
        widget: "object"
        fields:
          - { label: "بالعربية ★", name: "ar", widget: "string" }
          - { label: "بالإنجليزية (اختياري)", name: "en", widget: "string", required: false, default: "" }
      - label: "الوصف"
        name: "description"
        widget: "object"
        fields:
          - { label: "بالعربية", name: "ar", widget: "text", required: false, default: "" }
          - { label: "بالإنجليزية", name: "en", widget: "text", required: false, default: "" }
      - label: "الفئة"
        name: "category"
        widget: "select"
        options:
          - { label: "قرار رسمي", value: "decision" }
          - { label: "إعلان / تعميم", value: "announcement" }
          - { label: "تقرير", value: "report" }
          - { label: "سياسة / لائحة", value: "policy" }
          - { label: "محضر اجتماع", value: "minutes" }
          - { label: "أخرى", value: "other" }
      - { label: "تاريخ الإصدار (YYYY-MM-DD)", name: "date", widget: "string" }
      - { label: "مسار الملف العام", name: "file", widget: "string", hint: "/circulars/files/...", required: false, default: "" }
      - { label: "حجم الملف (بايت)", name: "fileSize", widget: "number", required: false, default: 0 }
      - { label: "نوع MIME", name: "fileType", widget: "string", required: false, default: "application/octet-stream" }
      - { label: "رفع بواسطة", name: "uploadedBy", widget: "string", required: false, default: "" }
      - { label: "ترتيب", name: "order", widget: "number", required: false, default: 0 }
