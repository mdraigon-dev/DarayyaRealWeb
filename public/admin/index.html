<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إدارة منصة داريّا — Darayya CMS</title>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
  </style>
</head>
<body>
  <!--
    IMPORTANT: Keep this URL in sync with src/data/netlify-config.ts
    (NETLIFY_IDENTITY_URL). This file is plain HTML and can't import the
    TypeScript config, so the URL is duplicated. If you change the Netlify
    site name, update both places.

    This is the Netlify-hosted Identity service, which lives separately from
    the GitHub Pages public site. See netlify-config.ts for setup steps.
  -->
  <script>
    window.netlifyIdentity = window.netlifyIdentity || {};
    window.netlifyIdentityConfig = { APIUrl: 'https://darayya-platform.netlify.app/.netlify/identity' };
  </script>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <!-- Decap CMS — friendly admin UI that saves edits back to GitHub -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    // Initialize widget with the explicit Identity URL (so it works on GitHub Pages)
    if (window.netlifyIdentity && typeof window.netlifyIdentity.init === 'function') {
      try {
        window.netlifyIdentity.init({ APIUrl: window.netlifyIdentityConfig.APIUrl });
      } catch (e) {
        // Already initialized
      }
    }

    // When a Netlify Identity user logs in to Decap, send them on with the session.
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', user => {
        if (!user) {
          window.netlifyIdentity.on('login', () => {
            document.location.href = '/admin/';
          });
        }
      });
    }
  </script>
</body>
</html>
