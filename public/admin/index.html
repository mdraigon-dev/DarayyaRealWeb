<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إدارة منصة داريّا — Darayya CMS</title>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
  </style>
</head>
<body>
  <!-- Netlify Identity widget — provides login for both Decap CMS (this page)
       and the Council Dashboard (/ar/admin/, /en/admin/).
       Since this site is hosted on Netlify, the widget auto-detects the
       Identity API URL. No explicit configuration needed. -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <!-- Decap CMS — friendly admin UI that saves edits back to GitHub -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    // After Decap login, redirect to the admin home
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', user => {
        if (!user) {
          window.netlifyIdentity.on('login', () => {
            document.location.href = '/admin/';
          });
        }
      });
    }
  </script>
</body>
</html>
