# =====================================================================
# Deploy Astro site to GitHub Pages
#
# Pipeline:
#   1. Checkout
#   2. Install dependencies
#   3. Auto-translate empty EN fields via MyMemory (best-effort)
#   4. Commit translation results back to main (if any changes)
#   5. Build Astro
#   6. Deploy to GitHub Pages
#
# The auto-translate step is best-effort — if it fails (rate-limit,
# network error, MyMemory down), the build still proceeds with the
# fallback of "show Arabic on EN page" handled by the loc() helper.
# =====================================================================
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed for the translation commit step
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so the auto-translate commit can push back
          fetch-depth: 0
          # Use the default GITHUB_TOKEN, which has contents: write per the
          # permissions block above. That's enough to push to main.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ────────────────────────────────────────────────────────────
      # AUTO-TRANSLATE: fill empty EN fields via MyMemory.
      # Best-effort: if this fails we continue (continue-on-error).
      # ────────────────────────────────────────────────────────────
      - name: Auto-translate AR → EN
        id: translate
        continue-on-error: true
        env:
          # Add MYMEMORY_EMAIL as a repo secret to raise the daily limit
          # from 5,000 chars to 50,000 chars.
          MYMEMORY_EMAIL: ${{ secrets.MYMEMORY_EMAIL }}
        run: node scripts/auto-translate.mjs

      - name: Commit translations back to main
        if: steps.translate.outcome == 'success'
        run: |
          if [[ -n "$(git status --porcelain src/content/projects)" ]]; then
            git config user.name "darayya-platform[bot]"
            git config user.email "darayya-platform-bot@users.noreply.github.com"
            git add src/content/projects/
            git commit -m "chore: auto-translate empty EN fields via MyMemory [skip ci]"
            git push origin HEAD:main
            echo "✓ Translations committed and pushed"
          else
            echo "ℹ No new translations to commit"
          fi

      # ────────────────────────────────────────────────────────────
      # ASTRO BUILD
      # ────────────────────────────────────────────────────────────
      - name: Build site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
